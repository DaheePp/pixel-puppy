<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>픽셀 강아지 🐕</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body { font-family:'Apple SD Gothic Neo','Pretendard',sans-serif; transition:background .8s; }

  /* ===== 배경 테마 3종 (body와 슬라이드 레이어가 함께 사용) ===== */
  body.theme-grass, #slideLayer.theme-grass {
    background-color:#90c26b;
    background-image:
      radial-gradient(#9ecf79 14%, transparent 15%),
      radial-gradient(#85b65f 11%, transparent 12%),
      linear-gradient(180deg, #b6e0f0 0%, #c7e7a8 12%, transparent 28%),
      linear-gradient(0deg, rgba(60,90,40,.18) 0%, transparent 30%);
    background-size:110px 110px, 160px 160px, 100% 100%, 100% 100%;
    background-position:0 0, 55px 70px, 0 0, 0 0;
  }
  body.theme-beach, #slideLayer.theme-beach {
    background:
      radial-gradient(circle at 78% 12%, rgba(255,247,210,.85) 0%, transparent 26%),
      linear-gradient(#4fa9d4 0%, #6cc0e0 18%, #aee2ef 26%, #f5e6b8 31%, #efd9a2 60%, #e6c98e 100%);
  }
  body.theme-room, #slideLayer.theme-room {
    background:
      linear-gradient(120deg, rgba(255,240,200,.5) 0%, transparent 38%),
      linear-gradient(#f3ece0 0%, #efe7d9 23.5%, #b98c5d 24%, transparent 24%),
      repeating-linear-gradient(180deg, #d2a472 0 44px, #c2925f 44px 46px);
  }

  /* ----- 산책지 배경 3종 ----- */
  body.theme-forest, #slideLayer.theme-forest {
    background-color:#5b8f49;
    background-image:
      radial-gradient(#68a055 14%, transparent 15%),
      radial-gradient(#4e8040 11%, transparent 12%);
    background-size:110px 110px, 160px 160px;
    background-position:0 0, 55px 70px;
  }
  body.theme-road, #slideLayer.theme-road {
    background:linear-gradient(#5cb6d6 0%, #7ecbe3 20%, #b5e6ef 24%, #f3e0b0 26%,
      #f3e0b0 28%, #75787d 28%, #6a6d72 46%, #f3e0b0 46.5%, #ecd49e 100%);
  }
  body.theme-park, #slideLayer.theme-park {
    background-color:#9ccb77;
    background-image:
      linear-gradient(transparent 0 56%, #e8d8ae 56% 70%, transparent 70%),
      radial-gradient(#a9d685 14%, transparent 15%);
    background-size:100% 100%, 120px 120px;
  }
  #grassTop, #seaFoam, #roadLine, #rug { pointer-events:none; }
  #roadLine { position:fixed; left:0; width:100%; top:36%; height:8px; z-index:1; display:none;
    background:repeating-linear-gradient(90deg, #f5f2e8 0 46px, transparent 46px 92px); }
  body.theme-road #roadLine { display:block; }
  body.theme-forest #grassTop { display:block; background:#3e7034; border-color:#35602d; }
  body.theme-park   #grassTop { display:block; }

  /* 산책 중에는 집 소품(개집/쿠션/장난감)이 안 보이게 */
  .prop { transition:opacity .6s; }
  body.theme-forest .prop, body.theme-road .prop, body.theme-park .prop { opacity:0; }

  /* ===== 공간 이동 슬라이딩 레이어 ===== */
  /* 배경 전환 시 목적지 배경이 좌/우에서 밀려 들어와 카메라가 이동하는 느낌 */
  #slideLayer { position:fixed; inset:0; z-index:4000; display:none; will-change:transform; }
  body.sliding .prop { opacity:0 !important; }   /* 전환 중 소품은 잠깐 숨김 */
  body.sliding #decor, body.sliding #sky { opacity:0 !important; }

  /* 테마별 전용 장식 (해당 테마일 때만 보임) */
  #grassTop { position:fixed; top:0; left:0; width:100%; height:64px; z-index:1;
    background:#79ab55; border-bottom:6px solid #6a9c49; display:none; }
  body.theme-grass #grassTop { display:block; }

  #seaFoam { position:fixed; left:0; width:100%; top:calc(30% - 14px); height:9px; z-index:1;
    background:rgba(255,255,255,.7); border-radius:50%; filter:blur(2px); display:none;
    animation:foam 3.2s ease-in-out infinite alternate; }
  body.theme-beach #seaFoam { display:block; }
  @keyframes foam { from{ transform:scaleY(.5) translateY(0);} to{ transform:scaleY(1.3) translateY(5px);} }

  #rug { position:fixed; left:50%; top:58%; width:380px; height:210px; z-index:1;
    transform:translate(-50%,-50%); border-radius:50%; display:none;
    background:#edf1f4; border:10px solid #d8e0e6; opacity:.9; }
  body.theme-room #rug { display:block; }

  /* ----- 움직이는 하늘 (구름/해/나비) : 실외 테마에서만 ----- */
  #sky { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden;
    opacity:0; transition:opacity .6s; }
  body.theme-grass #sky, body.theme-beach #sky,
  body.theme-forest #sky, body.theme-road #sky, body.theme-park #sky { opacity:1; }
  #sky canvas { position:absolute; image-rendering:pixelated; }
  .cloud { animation:drift linear infinite; }
  @keyframes drift { from{ transform:translateX(-220px);} to{ transform:translateX(calc(100vw + 220px));} }
  .sun { animation:sunpulse 4s ease-in-out infinite alternate; }
  @keyframes sunpulse { from{ filter:brightness(1);} to{ filter:brightness(1.18);} }
  .bfly { animation:flutter 14s ease-in-out infinite alternate; }
  @keyframes flutter {
    0%   { transform:translate(0,0) rotate(-4deg); }
    25%  { transform:translate(22vw,-7vh) rotate(5deg); }
    50%  { transform:translate(40vw,4vh) rotate(-3deg); }
    75%  { transform:translate(60vw,-6vh) rotate(6deg); }
    100% { transform:translate(82vw,2vh) rotate(-4deg); }
  }

  .deco { position:fixed; pointer-events:none; opacity:0; transition:opacity .6s; z-index:2; }
  body.theme-grass  .deco.g,
  body.theme-beach  .deco.b,
  body.theme-room   .deco.r,
  body.theme-forest .deco.f,
  body.theme-road   .deco.d,
  body.theme-park   .deco.p { opacity:1; }

  /* ===== 강아지 / 소품 ===== */
  canvas { image-rendering:pixelated; display:block; }
  #dog { position:fixed; width:104px; height:96px; cursor:pointer; transform-origin:bottom center; }
  #shadow { position:fixed; width:76px; height:20px; pointer-events:none;
    background:radial-gradient(ellipse, rgba(60,40,20,.22) 0%, transparent 68%); }
  .prop { position:fixed; pointer-events:none; }
  #bowl, #ball { position:fixed; display:none; }
  #ball { cursor:grab; touch-action:none; padding:10px; margin:-10px; }  /* 잡기 쉽게 히트 영역 확대 */
  #themeRow button:disabled { opacity:.45; cursor:not-allowed; }

  /* 말풍선 */
  #bubble { position:fixed; background:#fff; border:3px solid #5a4632; border-radius:12px;
    padding:6px 12px; font-size:15px; font-weight:700; color:#5a4632;
    opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap; z-index:6000; }
  #bubble::after { content:''; position:absolute; bottom:-9px; left:18px;
    border:6px solid transparent; border-top:8px solid #5a4632; }

  .fx { position:fixed; font-size:20px; pointer-events:none; z-index:6500;
    animation:floatUp 1.1s ease-out forwards; }
  @keyframes floatUp {
    from{ opacity:1; transform:translateY(0) scale(.6); }
    to{ opacity:0; transform:translateY(-70px) scale(1.3); }
  }

  /* ===== 상태 패널 ===== */
  #panel { position:fixed; top:16px; left:16px; width:236px; z-index:5000;
    background:rgba(255,255,255,.93); border:3px solid #5a4632; border-radius:14px;
    padding:12px 14px; box-shadow:0 4px 0 rgba(90,70,50,.25); }
  #nameRow { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  #dogName { font-size:18px; font-weight:800; color:#5a4632; cursor:pointer; }
  #dogName:hover { text-decoration:underline; }
  #lvl { font-size:13px; font-weight:700; color:#fff; background:#8a6cd1; border-radius:8px; padding:2px 7px; }
  #mood { font-size:18px; margin-left:auto; }
  .xpbar { height:6px; background:#e8e0f5; border-radius:4px; overflow:hidden; margin-bottom:10px; }
  #xpFill { height:100%; width:0%; background:#8a6cd1; transition:width .4s; }
  .stat { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:15px; }
  .bar { flex:1; height:12px; background:#eee4d4; border-radius:6px; overflow:hidden; border:1.5px solid #d8c9ae; }
  .bar > div { height:100%; transition:width .4s; border-radius:5px; }
  #hungerFill { background:#f0a04b; } #happyFill { background:#ef7fa0; } #energyFill { background:#5bbfa8; }
  #themeRow { display:flex; gap:6px; margin-top:10px; }
  #themeRow button { flex:1; font-family:inherit; font-size:13px; font-weight:700; color:#5a4632;
    background:#f6efe2; border:2px solid #d8c9ae; border-radius:9px; padding:5px 0; cursor:pointer; }
  #themeRow button.on { background:#5a4632; color:#fff; border-color:#5a4632; }
  #tip { font-size:11.5px; color:#a08a6a; margin-top:8px; }

  /* ===== 행동 버튼 ===== */
  #controls { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    display:flex; gap:12px; z-index:5000; }
  #controls button { font-family:inherit; font-size:16px; font-weight:800; color:#5a4632;
    background:#fff; border:3px solid #5a4632; border-radius:14px;
    padding:10px 20px; cursor:pointer; box-shadow:0 4px 0 #5a4632;
    transition:transform .08s, box-shadow .08s; }
  #controls button:hover:not(:disabled){ transform:translateY(2px); box-shadow:0 2px 0 #5a4632; }
  #controls button:disabled { opacity:.45; cursor:not-allowed; }
  .btnWrap { display:flex; flex-direction:column; gap:5px; }
  .cd { height:6px; border-radius:3px; background:rgba(255,255,255,.55);
    border:1.5px solid rgba(90,70,50,.35); overflow:hidden; opacity:0; transition:opacity .25s; }
  .cd > div { height:100%; background:#5a4632; border-radius:2px; }

  #resetBtn { position:fixed; top:16px; right:16px; z-index:5000; font-size:11px; color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.35); background:none; border:none; cursor:pointer; text-decoration:underline; }

  /* ===== 시작 모달 (견종 선택 + 이름) ===== */
  #startModal { position:fixed; inset:0; background:rgba(70,55,40,.45); z-index:9000;
    display:flex; align-items:center; justify-content:center; }
  #startModal.hidden { display:none; }
  #startModal .box { background:#fffaf2; border:4px solid #5a4632; border-radius:20px;
    padding:26px 30px; text-align:center; box-shadow:0 6px 0 rgba(90,70,50,.3); max-width:680px; }
  #startModal h2 { color:#5a4632; margin-bottom:16px; font-size:21px; }
  #breedGrid { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:18px; }
  .breedCard { border:3px solid #d8c9ae; border-radius:14px; padding:8px 6px 6px; cursor:pointer;
    background:#fff; transition:transform .1s, border-color .1s; }
  .breedCard:hover { transform:translateY(-3px); }
  .breedCard.on { border-color:#8a6cd1; background:#f3eefc; }
  .breedCard canvas { margin:0 auto; }
  .breedCard div { font-size:12.5px; font-weight:700; color:#5a4632; margin-top:4px; }
  #nameInput { font-family:inherit; font-size:16px; padding:8px 12px; text-align:center;
    border:3px solid #d8c9ae; border-radius:10px; outline:none; width:190px; }
  #nameInput:focus { border-color:#8a6cd1; }
  #startBtn { display:block; margin:16px auto 0; font-family:inherit; font-size:16px; font-weight:800;
    color:#fff; background:#8a6cd1; border:none; border-radius:12px;
    padding:11px 32px; cursor:pointer; box-shadow:0 3px 0 #6a4fb0; }
</style>
</head>
<body class="theme-grass">

<div id="slideLayer"></div>
<div id="sky"></div>
<div id="grassTop"></div>
<div id="seaFoam"></div>
<div id="roadLine"></div>
<div id="rug"></div>
<div id="decor"></div>

<!-- 소품들 (픽셀로 직접 그림) -->
<div class="prop" id="propHouse"><canvas width="104" height="80"></canvas></div>
<div class="prop" id="propCushion"><canvas width="96" height="48"></canvas></div>
<div class="prop" id="propBone"><canvas width="48" height="28"></canvas></div>
<div class="prop" id="propToy"><canvas width="32" height="32"></canvas></div>

<div id="bowl"><canvas width="56" height="28"></canvas></div>
<div id="ball"><canvas width="32" height="32"></canvas></div>

<div id="shadow"></div>
<div id="dog"><canvas id="dogCanvas" width="104" height="96"></canvas></div>
<div id="bubble"></div>

<div id="panel">
  <div id="nameRow">
    <span id="dogName" title="클릭해서 이름 바꾸기">콩이</span>
    <span id="lvl">Lv.1</span>
    <span id="mood">😊</span>
  </div>
  <div class="xpbar"><div id="xpFill"></div></div>
  <div class="stat">🍖<div class="bar"><div id="hungerFill"></div></div></div>
  <div class="stat">💗<div class="bar"><div id="happyFill"></div></div></div>
  <div class="stat">⚡<div class="bar"><div id="energyFill"></div></div></div>
  <div id="themeRow">
    <button data-theme="grass">🌿 잔디</button>
    <button data-theme="beach">🏖 해변</button>
    <button data-theme="room">🏠 거실</button>
  </div>
  <div id="tip">강아지를 클릭하면 쓰다듬을 수 있어요!</div>
</div>

<div id="controls">
  <div class="btnWrap">
    <button id="btnFeed">🍖 밥주기</button>
    <div class="cd" id="cdFeed"><div></div></div>
  </div>
  <div class="btnWrap">
    <button id="btnPlay">⚽ 공놀이</button>
    <div class="cd" id="cdPlay"><div></div></div>
  </div>
  <div class="btnWrap">
    <button id="btnWalk">🦮 산책</button>
    <div class="cd" id="cdWalk"><div></div></div>
  </div>
  <div class="btnWrap">
    <button id="btnSleep">💤 재우기</button>
    <div class="cd" id="cdSleep"><div></div></div>
  </div>
</div>
<button id="resetBtn">처음부터 다시 키우기</button>

<div id="startModal" class="hidden">
  <div class="box">
    <h2>🐶 함께할 강아지를 골라주세요!</h2>
    <div id="breedGrid"></div>
    <input id="nameInput" maxlength="8" placeholder="이름을 지어주세요 (예: 콩이)">
    <button id="startBtn">시작하기!</button>
  </div>
</div>

<script>
/* =========================================================
   1. 기본 설정
   ========================================================= */
const SCALE = 4;          // 픽셀 1칸 = 4px
const SAVE_KEY = 'pixelPuppySave_v2';
const PINK = '#f2a6b8', INK = '#2b2420', SPOT = '#3f3a36';

/* ----- 견종 도감: 색과 생김새를 데이터로 정의 -----
   ear: pointy(뾰족) / big(코기 큰귀) / floppy(늘어진) / curly(곱슬)
   tail: curl(말린꼬리) / pom(방울) / plume(깃털) / nub(짧은 꽁지)
   eyeColor: 눈동자 색(없으면 검정) / spots: 점박이 무늬   */
const BREEDS = {
  poodle : { label:'갈색 푸들',   body:'#a4724e', shade:'#85583a', light:'#c08c63',
             muzzle:'#c08c63', ear:'curly',  tail:'pom',   fluff:true,  legH:4, crown:true  },
  maltese: { label:'흰색 말티즈', body:'#f5f0e8', shade:'#d8cdbb', light:'#ffffff',
             muzzle:'#ffffff', ear:'floppy', tail:'plume', fluff:true,  legH:3, crown:true  },
  pome   : { label:'포메라니안',  body:'#efd7b3', shade:'#d6b98c', light:'#f9ecd8',
             muzzle:'#f9ecd8', ear:'pointy', tail:'curl',  fluff:true,  legH:3, cheeks:true },
  corgi  : { label:'웰시코기',    body:'#e6a155', shade:'#c4823c', light:'#f2bd7d',
             muzzle:'#fbf3e4', belly:'#fbf3e4', ear:'big', tail:'nub',  fluff:false, legH:2 },
  shiba  : { label:'시바견',      body:'#e3954c', shade:'#c47636', light:'#f0b06d',
             muzzle:'#fbf1df', belly:'#fbf1df', ear:'pointy', tail:'curl', fluff:false, legH:4 },
  golden : { label:'골든 리트리버', body:'#e7b86a', shade:'#c8974c', light:'#f6d597',
             muzzle:'#f9e6c2', belly:'#f9e6c2', ear:'floppy', tail:'plume', fluff:false, legH:4 },
  husky  : { label:'허스키',      body:'#9aa6b0', shade:'#727f8a', light:'#c3ccd3',
             muzzle:'#f4f6f7', belly:'#f4f6f7', ear:'pointy', tail:'plume', fluff:false, legH:4,
             eyeColor:'#5aa9e0', mask:true },
  dalmatian:{ label:'달마시안',   body:'#fbfbf6', shade:'#dcdcd2', light:'#ffffff',
             muzzle:'#ffffff', ear:'floppy', tail:'plume', fluff:false, legH:4, spots:true }
};

/* ----- 배경 테마: 바닥이 시작되는 높이(floorTop)가 달라요 ----- */
const THEMES = {
  grass : () => 70,                      // 잔디: 위쪽 수풀 아래부터
  beach : () => innerHeight * 0.30,      // 해변: 바다 아래 모래부터
  room  : () => innerHeight * 0.24,      // 거실: 벽 아래 마루부터
  forest: () => 70,                      // (산책지) 숲속
  road  : () => innerHeight * 0.30,      // (산책지) 해변도로
  park  : () => 70                       // (산책지) 공원
};

/* 집 테마별 산책지: [배경이름, 말풍선 문구] */
const WALK_DEST = {
  grass: ['forest', '숲속으로'],
  beach: ['road',   '해변도로로'],
  room : ['park',   '공원으로']
};

/* =========================================================
   2. 저장되는 데이터
   ========================================================= */
let pet = {
  name:'콩이', breed:'shiba', theme:'grass',
  hunger:85, happy:85, energy:90,
  xp:0, level:1, lastTime:Date.now()
};

/* ----- 스탯 감소 속도 (초 단위: 이 시간마다 1씩 감소) -----
   배고픔과 행복은 3시간, 에너지는 6시간에 걸쳐 100→0.
   잠은 약 3분이면 완충! */
const DECAY = { hunger:108, happy:108, energy:216, sleepGain:1.8 };

/* =========================================================
   3. 지금 이 순간의 상태 (저장 안 함)
   ========================================================= */
let started = false;   // 견종/이름을 정하기 전엔 저장하지 않기 위한 플래그
let state = 'idle', stateTimer = 2;
let dog = { x:innerWidth/2, y:innerHeight*0.6 };  // 발 끝의 좌표
let walkTarget = { x:dog.x, y:dog.y };
let dir = 1, animFrame = 0, animClock = 0;
let bubbleTimer = 0, idleTalkClock = 0;
let walkiesTimer = 0, sparkleClock = 0, jumpUp = false, playCtx = 'toy';
let sliding = false;   // 배경 슬라이딩(공간 이동) 연출 중인지
let playSession = false, dragging = false, lastBallTouch = 0, dragSamples = [];
let calledByUser = false;   // 산책 중 유저가 불러서 가는 중인지 (빠르게 달려감)
let visualTheme = 'grass';   // 지금 화면에 보이는 배경 (산책 중엔 임시로 바뀜)

const bowl = { active:false, x:0, y:0 };
const ball = { active:false, x:0, y:0, vx:0, vy:0, settled:false };

/* =========================================================
   4. 픽셀 그리기 도구
   ========================================================= */
function P(g, x, y, w, h, c) { g.fillStyle = c; g.fillRect(x, y, w, h); }

/* ----- 얼굴: 정면을 살짝 바라보는 ¾ 시점이라 더 귀여워요 ----- */
function drawHead(g, b, hx, hy, closed) {
  // 둥근 머리
  P(g, hx+1, hy, 8, 1, b.body);
  P(g, hx, hy+1, 10, 6, b.body);
  P(g, hx+1, hy+7, 8, 1, b.body);

  // 귀 (견종별)
  if (b.ear === 'pointy') {
    P(g, hx+1, hy-3, 1, 1, b.body); P(g, hx+1, hy-2, 2, 2, b.body); P(g, hx+2, hy-1, 1, 1, PINK);
    P(g, hx+8, hy-3, 1, 1, b.body); P(g, hx+7, hy-2, 2, 2, b.body); P(g, hx+7, hy-1, 1, 1, PINK);
  } else if (b.ear === 'big') {
    P(g, hx, hy-3, 3, 4, b.body);   P(g, hx+1, hy-2, 1, 2, PINK);
    P(g, hx+7, hy-3, 3, 4, b.body); P(g, hx+8, hy-2, 1, 2, PINK);
  } else if (b.ear === 'floppy') {
    P(g, hx-1, hy+1, 2, 5, b.shade);
    P(g, hx+9, hy+1, 2, 5, b.shade);
  } else if (b.ear === 'curly') {
    P(g, hx-1, hy, 2, 5, b.body);  P(g, hx-1, hy+1, 1, 1, b.shade); P(g, hx, hy+3, 1, 1, b.shade);
    P(g, hx+9, hy, 2, 5, b.body);  P(g, hx+10, hy+1, 1, 1, b.shade); P(g, hx+9, hy+3, 1, 1, b.shade);
  }
  if (b.crown) {  // 머리 위 복슬 (푸들/말티즈)
    P(g, hx+2, hy-2, 6, 2, b.light); P(g, hx+3, hy-3, 4, 1, b.light);
  }
  if (b.cheeks) { // 볼 복슬 (포메)
    P(g, hx-1, hy+3, 1, 3, b.light); P(g, hx+10, hy+3, 1, 3, b.light);
  }
  if (b.mask) {   // 이마~주둥이로 이어지는 밝은 줄무늬 (허스키)
    P(g, hx+4, hy+1, 2, 4, b.muzzle || b.light);
  }

  // 주둥이 + 코 + 입
  P(g, hx+3, hy+5, 4, 3, b.muzzle || b.light);
  P(g, hx+4, hy+5, 2, 1, INK);
  P(g, hx+5, hy+7, 1, 1, b.shade);

  // 눈 (큰 반짝이로 더 또렷하고 귀엽게) / 감은 눈
  if (closed) {
    // ‿‿ 모양으로 살짝 휘어 더 사랑스럽게
    P(g, hx+2, hy+4, 2, 1, INK); P(g, hx+1, hy+3, 1, 1, INK);
    P(g, hx+6, hy+4, 2, 1, INK); P(g, hx+8, hy+3, 1, 1, INK);
  } else {
    const ec = b.eyeColor || INK;
    P(g, hx+2, hy+3, 2, 2, ec); P(g, hx+6, hy+3, 2, 2, ec);
    if (b.eyeColor) { P(g, hx+3, hy+4, 1, 1, INK); P(g, hx+6, hy+4, 1, 1, INK); }  // 동공
    // 큰 반짝이(좌상) + 작은 윤기(우하)로 촉촉한 눈
    P(g, hx+2, hy+3, 1, 1, '#fff'); P(g, hx+6, hy+3, 1, 1, '#fff');
    P(g, hx+3, hy+4, 1, 1, '#ffffff88'); P(g, hx+7, hy+4, 1, 1, '#ffffff88');
  }
  // 볼터치 (도톰하게)
  P(g, hx, hy+6, 2, 1, PINK); P(g, hx+8, hy+6, 2, 1, PINK);
}

/* ----- 꼬리 (f가 0/1로 바뀌며 살랑살랑) ----- */
function drawTail(g, b, bx, by, f) {
  const w = f ? 1 : 0;
  if (b.tail === 'curl') {        // 동그랗게 말린 꼬리 (시바/포메)
    P(g, bx, by-4+w, 4, 4, b.body); P(g, bx+1, by-3+w, 2, 2, b.light);
  } else if (b.tail === 'pom') {  // 방울 꼬리 (푸들)
    P(g, bx+2, by-2, 1, 3, b.body); P(g, bx-1, by-6+w, 4, 4, b.light);
  } else if (b.tail === 'plume') {// 풍성한 깃털 꼬리 (말티즈)
    P(g, bx-1+w, by-5, 3, 5, b.light); P(g, bx+w, by-6, 2, 1, b.light);
  } else {                        // 짧은 꽁지 (코기)
    P(g, bx+1, by+1-w, 2, 2, b.body);
  }
}

/* ----- 자세별 전신 그리기 ----- */
function drawDogSprite(g, b, pose, f) {
  g.clearRect(0, 0, 26, 24);
  const legH = b.legH;
  const bt = 18 - legH;            // 몸통 윗변 (다리 길이에 따라 달라짐)

  if (pose === 'stand' || pose === 'walk' || pose === 'eat' || pose === 'jump') {
    drawTail(g, b, 2, bt, f);
    // 몸통 (모서리 둥글게 2겹)
    P(g, 6, bt, 10, 6, b.body);
    P(g, 5, bt+1, 12, 4, b.body);
    if (b.fluff) { P(g,6,bt-1,2,1,b.body); P(g,9,bt-1,2,1,b.body); P(g,12,bt-1,2,1,b.body); }
    if (b.belly) P(g, 6, bt+4, 9, 2, b.belly);
    if (b.spots) { P(g,7,bt+1,1,1,SPOT); P(g,12,bt,1,1,SPOT); P(g,10,bt+3,2,1,SPOT); P(g,14,bt+2,1,1,SPOT); }
    // 다리 4개 (걸을 때 두 쌍이 번갈아 들림)
    const tuck = pose === 'jump' ? Math.min(2, legH-1) : 0;
    [[6,0],[9,1],[12,1],[15,0]].forEach(([lx, gr]) => {
      const lift = pose === 'walk' && gr === f ? 1 : 0;
      const h = legH - lift - tuck;
      P(g, lx+lift, 24-legH+tuck, 2, h, b.body);
      P(g, lx+lift, 24-legH+tuck+h-1, 2, 1, b.shade);   // 발끝
    });
    // 머리 (먹을 땐 앞으로 숙임)
    if (pose === 'eat') drawHead(g, b, 14, bt-2+f, false);
    else drawHead(g, b, 12, bt-6, false);
  }
  else if (pose === 'sit') {
    drawTail(g, b, 2, 19, f);
    P(g, 7, 15, 5, 1, b.body);       // 둥근 등
    P(g, 6, 16, 7, 8, b.body);       // 몸통 (엉덩이 바닥)
    if (b.fluff) { P(g,7,14,2,1,b.body); P(g,10,14,2,1,b.body); }
    if (b.belly) P(g, 9, 18, 4, 6, b.belly);
    if (b.spots) { P(g,7,17,1,1,SPOT); P(g,10,20,2,1,SPOT); P(g,8,21,1,1,SPOT); }
    P(g, 12, 18, 2, 6, b.body);      // 앞다리
    P(g, 12, 23, 2, 1, b.shade);
    drawHead(g, b, 9, 8, false);
  }
  else if (pose === 'lie' || pose === 'sleep') {
    drawTail(g, b, 2, 21, pose === 'lie' ? f : 0);
    P(g, 5, 18, 12, 1, b.body);
    P(g, 4, 19, 14, 5, b.body);      // 납작 엎드린 몸
    if (b.fluff) { P(g,6,17,2,1,b.body); P(g,10,17,2,1,b.body); P(g,14,17,2,1,b.body); }
    if (b.spots) { P(g,7,20,1,1,SPOT); P(g,11,19,1,1,SPOT); P(g,13,22,2,1,SPOT); }
    P(g, 17, 21, 3, 3, b.body);      // 쭉 뻗은 앞발
    drawHead(g, b, 9, pose === 'sleep' ? 14 : 12, pose === 'sleep');
  }
}

/* =========================================================
   7. 행동 결정 (강아지의 작은 두뇌 🧠)
   ========================================================= */
function setState(s, dur) { state = s; stateTimer = dur; }

function randomSpot() {
  const ft = floorTop();
  return {
    x: 60 + Math.random() * (innerWidth - 120),
    y: ft + 50 + Math.random() * Math.max(80, innerHeight - ft - 110)
  };
}

function pickBehavior() {
  if (pet.energy <= 12) {              // 졸리면 쿠션으로 가서 잠들기
    walkTarget = { x: cushion().x, y: cushion().y + 4 };
    setState('toSleep', 9999);
    return;
  }
  const r = Math.random();
  if (r < 0.42)      { walkTarget = randomSpot(); setState('walk', 9999); }
  else if (r < 0.57) setState('idle', 2 + Math.random() * 3);
  else if (r < 0.74) setState('sit', 3 + Math.random() * 5);
  else if (r < 0.86) setState('lie', 4 + Math.random() * 5);
  else {                               // 가끔 장난감 갖고 혼자 놀기!
    walkTarget = { x: toy().x + 30, y: toy().y + 4 };
    playCtx = 'toy';
    setState('toToy', 9999);
  }
}

const busy = () => ['toBowl','eat','chase','playing','carry','walkies'].includes(state);

/* 강아지 주변의 가까운 지점 고르기 (공 몰고 다닐 때 사용) */
function nearbySpot(range) {
  const ft = floorTop();
  return {
    x: Math.max(60, Math.min(innerWidth - 60, dog.x + (Math.random() - 0.5) * range * 2)),
    y: Math.max(ft + 50, Math.min(innerHeight - 40, dog.y + (Math.random() - 0.5) * range))
  };
}

/* ----- 목표 지점으로 걷기. 도착하면 true ----- */
function moveToward(tx, ty, speed, dt) {
  const dx = tx - dog.x, dy = ty - dog.y;
  const d = Math.hypot(dx, dy);
  if (d < 7) return true;
  if (Math.abs(dx) > 4) dir = dx > 0 ? 1 : -1;
  dog.x += dx / d * speed * dt;
  dog.y += dy / d * speed * dt;
  return false;
}

/* =========================================================
   8. 상호작용 (밥 / 놀기 / 산책 / 쓰다듬기)
   ========================================================= */
function feed() {
  if (state === 'eat' || state === 'toBowl') return;   // 식사 중에만 잠김
  if (pet.hunger >= 90) { say('지금은 배불러요! 🐽'); return; }
  interrupt();                                          // 하던 활동은 정리하고 전환
  const spot = randomSpot();
  bowl.active = true; bowl.x = spot.x; bowl.y = spot.y;
  // 프로그레스바용: 걸어가는 시간 + 먹는 시간(4초) = 전체 예상 시간
  bowl.total = Math.hypot(bowl.x - 40 - dog.x, bowl.y + 2 - dog.y) / 110 + 4;
  drawBowl(true);
  bowlEl.style.display = 'block';
  bowlEl.style.left = (bowl.x - 28) + 'px';
  bowlEl.style.top  = (bowl.y - 28) + 'px';
  bowlEl.style.zIndex = Math.round(bowl.y);
  if (state === 'sleep') say('킁킁... 밥 냄새다!');
  setState('toBowl', 9999);
}

function play() {
  if (state === 'eat' || state === 'toBowl' || playSession) return;
  if (pet.energy <= 10) { say('너무 피곤해요... 😪'); return; }
  interrupt();
  const spot = randomSpot();
  ball.active = true; ball.settled = false;
  ball.x = spot.x; ball.y = spot.y;
  const ang = Math.random() * Math.PI * 2;
  const v = 220 + Math.random() * 160;
  ball.vx = Math.cos(ang) * v; ball.vy = Math.sin(ang) * v * 0.6;
  positionBall();
  ballEl.style.display = 'block';
  say('공이다!! ⚽', 2);
  playCtx = 'ball';
  playSession = true;
  lastBallTouch = performance.now();
  setState('chase', 9999);
}

/* 강아지가 코로 공을 톡! 쳐서 굴리기 (혼자 노는 드리블) */
function nudgeBall() {
  const ang = Math.random() * Math.PI * 2;
  const v = 160 + Math.random() * 140;
  ball.vx = Math.cos(ang) * v;
  ball.vy = Math.sin(ang) * v * 0.7;
  ball.settled = false;
  dir = ball.vx > 0 ? 1 : -1;          // 굴린 방향을 바라보기
}

/* 산책 마무리: 집 배경 복귀 + 보상 (도중에 다른 행동으로 전환해도 보상은 받아요)
   slide=true 면 집으로 슬라이딩 연출, false 면 즉시 복귀(다른 버튼으로 끊겼을 때) */
function endWalkies(slide) {
  if (slide) slideToVisual(pet.theme, -1, false);   // 집으로 되돌아가는 슬라이딩
  else setVisual(pet.theme);
  pet.happy = Math.min(100, pet.happy + 18);
  pet.hunger = Math.max(0, pet.hunger - 12);  // 산책하면 배가 많이 고파져요
  pet.energy = Math.max(0, pet.energy - 12);
  gainXp(20);
}

/* 하던 활동 정리: 다른 버튼을 눌러도 자연스럽게 전환되도록 */
function interrupt() {
  if (playSession) endPlay();
  else if (state === 'walkies') endWalkies(false);   // 다른 행동으로 전환 → 즉시 집 복귀
  jumpUp = false;
}

/* 놀이 끝: 10초간 공을 안 건드리면 호출됨 */
function endPlay() {
  playSession = false; dragging = false; jumpUp = false;
  ball.active = false; ballEl.style.display = 'none';
  pet.happy = Math.min(100, pet.happy + 20);
  pet.energy = Math.max(0, pet.energy - 8);
  pet.hunger = Math.max(0, pet.hunger - 8);   // 신나게 놀면 배가 고파져요
  gainXp(15);
  hearts(4);
  say('재밌었다~! 🥎', 2.5);
  setState('sit', 3);
}

function walkies() {
  if (state === 'eat' || state === 'toBowl' || state === 'walkies') return;
  if (pet.energy <= 20) { say('산책 가기엔 너무 졸려요... 💤'); return; }
  interrupt();
  const [dest, phrase] = WALK_DEST[pet.theme];
  slideToVisual(dest, 1, false);         // 산책지로 슬라이딩 (강아지는 산책 루프가 움직임)
  walkiesTimer = 10;
  walkTarget = randomSpot();
  say(`${phrase} 산책 가자~! 🐾`, 2.5);
  setState('walkies', 9999);
}

/* ----- 배경 터치: 강아지가 그 자리로 와요!
       평소엔 종종종 달려오고, 산책 중엔 터치할 때마다 10초 연장 ----- */
window.addEventListener('pointerdown', e => {
  if (e.target !== document.body) return;        // 버튼/패널/강아지 클릭은 제외
  if (state === 'eat' || state === 'toBowl' || playSession) return;  // 식사/공놀이 중엔 무시
  const ft = floorTop();
  walkTarget = {
    x: Math.max(40, Math.min(innerWidth - 40, e.clientX)),
    y: Math.max(ft + 40, Math.min(innerHeight - 30, e.clientY))
  };
  spawnFx(['🐾'], 1, e.clientX, e.clientY + 50);
  if (state === 'walkies') { walkiesTimer = 10; calledByUser = true; return; }   // 산책 연장!
  if (state === 'sleep') say('음냐... 불렀어요? 🥱', 2);
  setState('come', 9999);                        // 부르면 달려오기
});

function positionBall() {
  ballEl.style.left = (ball.x - 16) + 'px';
  ballEl.style.top  = (ball.y - 26) + 'px';
  // 강아지보다 항상 위에 두기: 강아지가 공 위에 있어도 공을 뺏을 수 있어요
  ballEl.style.zIndex = Math.round(ball.y) + 150;
}

/* ----- 공 드래그앤드롭: 잡아서 끌다가 놓으면 휙 던져져요! ----- */
ballEl.addEventListener('pointerdown', e => {
  if (!ball.active) return;
  dragging = true;
  dragSamples = [];
  lastBallTouch = performance.now();
  ballEl.setPointerCapture(e.pointerId);
  e.preventDefault();
});
window.addEventListener('pointermove', e => {
  if (!dragging) return;
  const ft = floorTop();
  ball.x = Math.max(30, Math.min(innerWidth - 40, e.clientX));
  ball.y = Math.max(ft + 30, Math.min(innerHeight - 30, e.clientY));
  ball.vx = 0; ball.vy = 0; ball.settled = false;
  lastBallTouch = performance.now();
  dragSamples.push({ x: ball.x, y: ball.y, t: performance.now() });
  if (dragSamples.length > 6) dragSamples.shift();   // 최근 움직임만 기억
  positionBall();
});
window.addEventListener('pointerup', () => {
  if (!dragging) return;
  dragging = false;
  // 마지막 손 움직임의 속도 = 던지는 속도 (플링!)
  if (dragSamples.length >= 2) {
    const a = dragSamples[0], b = dragSamples[dragSamples.length - 1];
    const ms = Math.max(16, b.t - a.t);
    ball.vx = Math.max(-520, Math.min(520, (b.x - a.x) / ms * 1000));
    ball.vy = Math.max(-420, Math.min(420, (b.y - a.y) / ms * 1000));
  }
  lastBallTouch = performance.now();
});

/* 재우기: 쿠션으로 가서 낮잠 → 에너지 회복 (다 차면 알아서 기상) */
function sleepNow() {
  if (state === 'eat' || state === 'toBowl' || state === 'sleep' || state === 'toSleep') return;
  if (pet.energy >= 85) { say('지금은 안 졸려요! 😆'); return; }
  interrupt();
  walkTarget = { x: cushion().x, y: cushion().y + 4 };
  setState('toSleep', 9999);
  say('쿠션에서 코~ 잘게요 💤');
}

function petDog() {
  if (state === 'sleep') { setState('idle', 2); say('음냐... 깼어요! 🥱'); }
  else say(['멍멍! 🐶','헥헥~ 😛','너무 좋아~ 💗','킁킁!'][Math.floor(Math.random()*4)]);
  pet.happy = Math.min(100, pet.happy + 4);
  hearts(2 + Math.floor(Math.random() * 3));
  gainXp(2);
}

function gainXp(n) {
  if (pet.level >= 100) return;
  pet.xp += n;
  const need = pet.level * 50;
  if (pet.xp >= need) {
    pet.xp -= need; pet.level++;
    say(pet.level >= 100 ? '최대 레벨 달성! 🏆' : `레벨 업! Lv.${pet.level} 🎉`, 3);
    hearts(6);
  }
  save();
}

/* =========================================================
   9. 메인 루프 (1초에 60번: 스탯 → 행동 → 그리기)
   ========================================================= */
let lastTick = performance.now();

function loop(now) {
  let dt = (now - lastTick) / 1000;
  lastTick = now;
  if (dt > 0.1) dt = 0.1;

  /* --- 스탯 변화 (아주 천천히) --- */
  pet.hunger = Math.max(0, pet.hunger - dt / DECAY.hunger);
  pet.happy  = Math.max(0, pet.happy  - dt / DECAY.happy);
  if (state === 'sleep') pet.energy = Math.min(100, pet.energy + dt / DECAY.sleepGain);
  else                   pet.energy = Math.max(0, pet.energy - dt / DECAY.energy);

  /* --- 애니메이션 프레임 (발/꼬리 교체) --- */
  animClock += dt;
  if (animClock > 0.18) { animClock = 0; animFrame = 1 - animFrame; }

  /* --- 행동 타이머 --- */
  if (!busy() && state !== 'walk' && state !== 'toSleep' && state !== 'toToy' && state !== 'come') {
    if (state === 'sleep') {
      if (pet.energy > 85) { say('잘 잤다! ☀️'); pickBehavior(); }
    } else {
      stateTimer -= dt;
      if (stateTimer <= 0) pickBehavior();
    }
  }

  /* --- 상태별 움직임 --- */
  if (state === 'walk')   { if (moveToward(walkTarget.x, walkTarget.y, 45, dt)) pickBehavior(); }
  if (state === 'come')   {
    if (moveToward(walkTarget.x, walkTarget.y, 120, dt)) {
      if (Math.random() < 0.3) say('멍! 🐶', 1.5);
      setState('sit', 2 + Math.random() * 2);   // 도착하면 앉아서 기다리기
    }
  }
  if (state === 'toSleep'){ if (moveToward(walkTarget.x, walkTarget.y, 120, dt)) { setState('sleep', 9999); say('Zzz... 💤', 3); } }
  if (state === 'toToy')  { if (moveToward(walkTarget.x, walkTarget.y, 80, dt)) setState('playing', 2.5); }
  if (state === 'toBowl') { if (moveToward(bowl.x - 40, bowl.y + 2, 110, dt)) { dir = 1; setState('eat', 4); say('냠냠냠 🍖'); } }
  if (state === 'chase')  {
    jumpUp = false;                      // 쫓아갈 땐 점프 해제
    const reached = moveToward(ball.x, ball.y + 6, 170, dt);
    if (ball.settled && reached && !dragging) {
      const r = Math.random();
      if (r < 0.2) setState('playing', 1.2);                // 가끔 신나서 폴짝!
      else if (r < 0.55) {                                  // 공 물고 어슬렁어슬렁
        walkTarget = nearbySpot(220);
        setState('carry', 9999);
      }
      else nudgeBall();                                     // 공 굴리며 돌아다니기
    }
  }
  if (state === 'carry') {
    if (dragging) setState('chase', 9999);                  // 공 뺏기면 쫓아가기
    else {
      const arrived = moveToward(walkTarget.x, walkTarget.y, 110, dt);
      // 공이 강아지 코앞에 붙어서 같이 이동
      ball.x = dog.x + dir * 38;
      ball.y = dog.y - 6;
      ball.vx = 0; ball.vy = 0; ball.settled = true;
      positionBall();
      if (arrived) { nudgeBall(); setState('chase', 9999); }
    }
  }
  if (state === 'walkies') {
    // 유저가 부르면 빠르게(230), 혼자 거닐 땐 느긋하게(160)
    const spd = calledByUser ? 230 : 160;
    if (moveToward(walkTarget.x, walkTarget.y, spd, dt)) { walkTarget = randomSpot(); calledByUser = false; }
    sparkleClock += dt;
    if (sparkleClock > 0.45) { sparkleClock = 0; spawnFx(['✨','🎵','💨'], 1, dog.x, dog.y); }
    walkiesTimer -= dt;
    if (walkiesTimer <= 0) {
      endWalkies(true);                  // 산책 끝, 집으로 슬라이딩하며 돌아오기
      say('산책 최고! 🥰', 2.5);
      setState('lie', 4);
    }
  }

  if (state === 'eat') {
    stateTimer -= dt;
    if (stateTimer <= 0) {
      bowl.active = false; bowlEl.style.display = 'none';
      pet.hunger = Math.min(100, pet.hunger + 25);
      pet.happy = Math.min(100, pet.happy + 3);
      say('맛있다!! 🐾', 2.5);
      gainXp(10);
      setState('sit', 3);
    }
  }
  if (state === 'playing') {
    jumpUp = animFrame === 1;
    if (playCtx === 'toy') {             // 장난감 혼자 놀기: 시간 되면 끝
      stateTimer -= dt;
      if (stateTimer <= 0) {
        jumpUp = false;
        pet.happy = Math.min(100, pet.happy + 2);
        setState('idle', 2);
      }
    } else if (dragging || !ball.settled) {
      setState('chase', 9999);           // 공이 다시 움직이면 쫓아가기!
    } else {
      stateTimer -= dt;                  // 폴짝 타임 끝나면 다시 드리블하러
      if (stateTimer <= 0) setState('chase', 9999);
    }
  }

  /* 10초간 공을 안 건드리면 놀이 자동 종료 */
  if (playSession && performance.now() - lastBallTouch > 10000) endPlay();

  /* --- 공 물리 (탑뷰: 마찰로 서서히 멈춤) --- */
  if (ball.active && !ball.settled && !dragging) {
    ball.x += ball.vx * dt; ball.y += ball.vy * dt;
    ball.vx *= (1 - 1.1 * dt); ball.vy *= (1 - 1.1 * dt);
    const ft = floorTop();
    if (ball.x < 30) { ball.x = 30; ball.vx *= -1; }
    if (ball.x > innerWidth - 40) { ball.x = innerWidth - 40; ball.vx *= -1; }
    if (ball.y < ft + 30) { ball.y = ft + 30; ball.vy *= -1; }
    if (ball.y > innerHeight - 30) { ball.y = innerHeight - 30; ball.vy *= -1; }
    if (Math.hypot(ball.vx, ball.vy) < 14) ball.settled = true;
    positionBall();
  }

  /* --- 가끔 혼잣말 --- */
  idleTalkClock += dt;
  if (idleTalkClock > 18 && !busy() && state !== 'sleep' && bubbleTimer <= 0) {
    idleTalkClock = 0;
    if (pet.hunger < 25)      say('배고파요... 🥣', 2.5);
    else if (pet.happy < 25)  say('심심해... 같이 놀아요! 🥺', 2.5);
    else if (Math.random() < 0.35) say(['멍!','...🦴?','킁킁'][Math.floor(Math.random()*3)], 1.5);
  }
  if (bubbleTimer > 0) {
    bubbleTimer -= dt;
    if (bubbleTimer <= 0) bubbleEl.style.opacity = 0;
  }

  render();
  requestAnimationFrame(loop);
}

/* =========================================================
   10. 화면 그리기
   ========================================================= */
const growth = () => Math.min(1.5, 1 + (pet.level - 1) * 0.04);

// 화면 아래쪽(가까운 곳)에 있을수록 크게 — 원근감!
function depthScale() {
  const ft = floorTop();
  const t = Math.max(0, Math.min(1, (dog.y - ft) / Math.max(1, innerHeight - ft)));
  return (0.72 + t * 0.5) * growth();
}

const poseOf = {
  idle:'stand', walk:'walk', come:'walk', toSleep:'walk', toToy:'walk', toBowl:'walk',
  chase:'walk', carry:'walk', walkies:'walk', sit:'sit', lie:'lie', sleep:'sleep',
  eat:'eat', playing:'jump'
};

function render() {
  const b = BREEDS[pet.breed];
  drawDogSprite(dogCtx, b, poseOf[state] || 'stand', animFrame);

  const s = depthScale();
  // 슬라이딩 중엔 강아지를 배경 레이어(z4000) 위로 띄워 같이 걷는 것처럼 보이게
  const dogZ = sliding ? 4500 : Math.round(dog.y);
  dogEl.style.left = (dog.x - 52) + 'px';
  dogEl.style.top  = (dog.y - 96) + 'px';
  dogEl.style.zIndex = dogZ;
  dogEl.style.transform = `scale(${dir * s}, ${s}) translateY(${jumpUp ? -16 : 0}px)`;

  shadowEl.style.left = (dog.x - 38) + 'px';
  shadowEl.style.top  = (dog.y - 12) + 'px';
  shadowEl.style.zIndex = dogZ - 1;
  shadowEl.style.transform = `scale(${s})`;

  bubbleEl.style.left = (dog.x - 16) + 'px';
  bubbleEl.style.top  = (dog.y - 96 * s - 26) + 'px';

  document.getElementById('hungerFill').style.width = pet.hunger + '%';
  document.getElementById('happyFill').style.width  = pet.happy + '%';
  document.getElementById('energyFill').style.width = pet.energy + '%';
  document.getElementById('xpFill').style.width = pet.level >= 100 ? '100%' : (pet.xp / (pet.level * 50) * 100) + '%';
  document.getElementById('lvl').textContent = 'Lv.' + pet.level;
  document.getElementById('dogName').textContent = pet.name;

  const lowest = Math.min(pet.hunger, pet.happy, pet.energy);
  document.getElementById('mood').textContent =
    state === 'sleep' ? '😴' : lowest < 20 ? '😢' : lowest < 45 ? '😐' : '😊';

  // 식사 중에만 모든 버튼이 잠겨요. 나머지 활동은 버튼 누르면 바로 전환!
  const eating = state === 'eat' || state === 'toBowl';
  const sleeping = state === 'sleep' || state === 'toSleep';
  document.getElementById('btnFeed').disabled = eating || pet.hunger >= 90;
  document.getElementById('btnPlay').disabled = eating || playSession || pet.energy <= 10;
  document.getElementById('btnWalk').disabled = eating || state === 'walkies' || pet.energy <= 20;
  document.getElementById('btnSleep').disabled = eating || sleeping || pet.energy >= 85;
  // 산책 중엔 테마 변경 잠금
  document.querySelectorAll('#themeRow button').forEach(b => b.disabled = state === 'walkies');

  // 안내 문구: 상황에 맞는 가이드로 바뀜
  document.getElementById('tip').textContent = state === 'walkies'
    ? '바닥을 터치하면 그곳으로 달려가요! 터치할 때마다 산책 연장 🐾'
    : playSession
    ? '공을 잡아서 끌다가 놓으면 던질 수 있어요! ⚽'
    : '강아지를 클릭하면 쓰다듬을 수 있어요!';

  /* --- 버튼 아래 프로그레스바 (남은 시간) --- */
  // 지금 진행 중인 활동의 남은 시간 비율 (1 → 0으로 줄어듦)
  let actFrac = null;   // 식사 중일 때의 남은 시간 (걷기 + 먹기 4초)
  if (state === 'eat') actFrac = stateTimer / 4;
  else if (state === 'toBowl')
    actFrac = (Math.hypot(bowl.x - 40 - dog.x, bowl.y + 2 - dog.y) / 110 + 4) / bowl.total;

  // 식사 중이면 남은 시간을, 아니면 스탯 회복 진행률을 표시
  setCd('cdFeed', eating ? actFrac : (pet.hunger >= 90 ? (100 - pet.hunger) / 10 : null));
  setCd('cdPlay', eating ? actFrac : (pet.energy <= 10 ? pet.energy / 10 : null));
  setCd('cdWalk', eating ? actFrac : (pet.energy <= 20 ? pet.energy / 20 : null));
  // 자는 동안엔 에너지 차오르는 진행률 표시
  setCd('cdSleep', eating ? actFrac : (sleeping ? pet.energy / 85 : null));
}

function setCd(id, frac) {
  const el = document.getElementById(id);
  if (frac == null) { el.style.opacity = 0; return; }
  el.style.opacity = 1;
  el.firstElementChild.style.width = (Math.max(0, Math.min(1, frac)) * 100) + '%';
}

/* =========================================================
   11. 테마 바꾸기
   ========================================================= */
/* 화면에 보이는 배경만 바꾸기 (산책 갈 때 사용) */
function setVisual(t) {
  visualTheme = t;
  document.body.className = 'theme-' + t + (sliding ? ' sliding' : '');
  layoutProps();
  // 강아지가 바닥 밖에 있으면 안으로 데려오기
  const ft = floorTop();
  if (dog.y < ft + 40) dog.y = ft + 60;
}

/* ----- 공간 이동 슬라이딩: 목적지 배경이 dir 방향에서 밀려 들어옴 -----
   dir +1 = 강아지가 오른쪽으로 걸어가고 새 공간이 오른쪽에서 등장
   trot=true 면 강아지도 그 방향으로 종종 걸어가요 (테마 버튼 전환용) */
const SLIDE_MS = 850;
function slideToVisual(t, dir, trot) {
  if (sliding) { setVisual(t); return; }   // 연출 겹치면 즉시 전환
  sliding = true;
  const layer = document.getElementById('slideLayer');
  layer.className = 'theme-' + t;                 // 목적지 배경 칠하기
  layer.style.transition = 'none';
  layer.style.transform = `translateX(${dir > 0 ? 100 : -100}%)`;
  layer.style.display = 'block';
  document.body.classList.add('sliding');         // 소품/장식 잠깐 숨김
  void layer.offsetWidth;                          // 리플로우 (애니메이션 시작점 확정)
  layer.style.transition = `transform ${SLIDE_MS}ms ease-in-out`;
  layer.style.transform = 'translateX(0)';

  if (trot) {   // 강아지가 이동 방향으로 종종 걸어가기
    walkTarget = { x: dir > 0 ? innerWidth * 0.72 : innerWidth * 0.28, y: dog.y };
    setState('walk', 9999);
  }

  setTimeout(() => {
    sliding = false;
    setVisual(t);                  // 실제 배경 커밋 (body 클래스 교체)
    layer.style.display = 'none';
    if (trot) pickBehavior();
  }, SLIDE_MS);
}

/* 집 테마 순서 — 슬라이드 방향 계산용 (오른쪽 테마로 가면 오른쪽으로 이동) */
const HOME_ORDER = ['grass', 'beach', 'room'];

/* 집 테마를 진짜로 바꾸기 (저장됨) */
function applyTheme(t, animate) {
  const dir = HOME_ORDER.indexOf(t) >= HOME_ORDER.indexOf(pet.theme) ? 1 : -1;
  pet.theme = t;
  if (animate) {
    interrupt();              // 공놀이 등 진행 중이던 활동 정리 (공이 덩그러니 남지 않게)
    slideToVisual(t, dir, true);   // 버튼 전환은 슬라이딩 연출
  }
  else setVisual(t);                          // 최초 로드는 즉시
  document.querySelectorAll('#themeRow button').forEach(btn =>
    btn.classList.toggle('on', btn.dataset.theme === t));
  if (started) save();
}
document.querySelectorAll('#themeRow button').forEach(btn =>
  btn.onclick = () => applyTheme(btn.dataset.theme, true));

/* =========================================================
   12. 저장 & 불러오기
   ========================================================= */
function save() {
  pet.lastTime = Date.now();
  localStorage.setItem(SAVE_KEY, JSON.stringify(pet));
}

function load() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    Object.assign(pet, JSON.parse(raw));
    // 자리 비운 시간만큼만 살짝 감소 (최대 48시간치, 5 밑으로는 안 떨어짐)
    const away = Math.min((Date.now() - pet.lastTime) / 1000, 48 * 3600);
    pet.hunger = Math.max(5, pet.hunger - away / DECAY.hunger);
    pet.happy  = Math.max(5, pet.happy  - away / DECAY.happy);
    pet.energy = Math.min(100, pet.energy + away / 120);  // 떠나 있는 동안 푹 쉼
    return true;
  } catch { return false; }
}
setInterval(() => { if (started) save(); }, 10000);
window.addEventListener('beforeunload', () => { if (started) save(); });

/* =========================================================
   13. 시작 모달 (견종 고르기 + 이름 짓기)
   ========================================================= */
let chosenBreed = 'shiba';
const modal = document.getElementById('startModal');

function buildBreedCards() {
  const grid = document.getElementById('breedGrid');
  for (const key of Object.keys(BREEDS)) {
    const card = document.createElement('div');
    card.className = 'breedCard' + (key === chosenBreed ? ' on' : '');
    const cv = document.createElement('canvas');
    cv.width = 104; cv.height = 96;
    const g = cv.getContext('2d');
    g.setTransform(SCALE, 0, 0, SCALE, 0, 0);
    drawDogSprite(g, BREEDS[key], 'stand', 0);
    const lb = document.createElement('div');
    lb.textContent = BREEDS[key].label;
    card.append(cv, lb);
    card.onclick = () => {
      chosenBreed = key;
      document.querySelectorAll('.breedCard').forEach(c => c.classList.remove('on'));
      card.classList.add('on');
    };
    grid.appendChild(card);
  }
}

function startGame() {
  const n = document.getElementById('nameInput').value.trim();
  pet.name = n || '콩이';
  pet.breed = chosenBreed;
  modal.classList.add('hidden');
  started = true;
  save();
  say(`멍멍! 나는 ${pet.name}! 🐶`, 3);
}
document.getElementById('startBtn').onclick = startGame;
document.getElementById('nameInput').onkeydown = e => { if (e.key === 'Enter') startGame(); };

/* =========================================================
   14. 이벤트 연결 & 출발!
   ========================================================= */
document.getElementById('btnFeed').onclick = feed;
document.getElementById('btnPlay').onclick = play;
document.getElementById('btnWalk').onclick = walkies;
document.getElementById('btnSleep').onclick = sleepNow;
dogEl.onclick = petDog;

document.getElementById('dogName').onclick = () => {
  const n = prompt('새 이름을 지어주세요!', pet.name);
  if (n && n.trim()) { pet.name = n.trim().slice(0, 8); save(); }
};
document.getElementById('resetBtn').onclick = () => {
  if (confirm('정말 처음부터 다시 키울까요? 지금까지의 기록이 사라져요!')) {
    started = false;   // 새로고침 직전 자동 저장이 기록을 되살리지 않게!
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }
};
window.addEventListener('resize', () => {
  layoutProps();
  dog.x = Math.min(dog.x, innerWidth - 60);
  dog.y = Math.min(Math.max(dog.y, floorTop() + 40), innerHeight - 30);
});

// ----- 시작 -----
const hasSave = load();
applyTheme(pet.theme);
dog.x = innerWidth / 2;
dog.y = floorTop() + (innerHeight - floorTop()) * 0.55;

if (hasSave) {
  started = true;
  say(`${pet.name}: 보고 싶었어요! 🐶`, 3);
} else {
  buildBreedCards();
  modal.classList.remove('hidden');
  document.getElementById('nameInput').focus();
}
requestAnimationFrame(loop);
</script>
